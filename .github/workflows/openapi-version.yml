name: OpenAPI Version

# Auto-bumps the project version whenever the public OpenAPI/Swagger schema
# changes, and triggers a Docker rebuild by pushing the version commit.
#
#   * patch — descriptions, examples, response tweaks
#   * minor — new endpoints / new optional fields
#   * major — removed endpoints / removed required fields
#
# On `pull_request`: dry-run, fails the check if the snapshot is stale,
# nudging the contributor to commit the schema diff.
# On `push` to main: writes the new version + snapshot back to the branch.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "pyproject.toml"
      - "scripts/openapi.py"
      - ".github/workflows/openapi-version.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "pyproject.toml"
      - "scripts/openapi.py"
      - ".github/workflows/openapi-version.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Bump version on OpenAPI change (PR — dry-run)
        if: github.event_name == 'pull_request'
        run: |
          python scripts/openapi.py bump --dry-run
          if ! git diff --quiet -- docs/openapi.json; then
            echo "::error::docs/openapi.json is stale. Run 'python scripts/openapi.py dump' and commit the result."
            git diff -- docs/openapi.json | head -200
            exit 1
          fi

      - name: Bump version on OpenAPI change (main)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: python scripts/openapi.py bump

      - name: Commit and push version bump
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet -- pyproject.toml docs/openapi.json; then
            echo "No version change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          git add pyproject.toml docs/openapi.json
          git commit -m "chore(openapi): bump version to ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
          git push origin "v${NEW_VERSION}"
